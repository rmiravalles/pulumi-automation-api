name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      # Pulumi secrets provider for stack config encryption.
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      # Required if using an Azure Blob Pulumi backend such as azblob://state.
      PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
      AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
      AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
      # Azure auth consumed by the azure-native provider.
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Pulumi login
        run: |
          if [ -n "$PULUMI_BACKEND_URL" ]; then
            "$HOME/.pulumi/bin/pulumi" login "$PULUMI_BACKEND_URL"
          else
            "$HOME/.pulumi/bin/pulumi" login
          fi

      - name: Deploy with Automation API
        run: python automation/deploy.py

      - name: Show website URL
        shell: bash
        run: |
          WEBSITE_URL=$("$HOME/.pulumi/bin/pulumi" stack output websiteUrl --stack dev)
          echo "Website URL: $WEBSITE_URL"
          echo "::notice title=Static Website URL::$WEBSITE_URL"
          {
            echo "## Deployment Output"
            echo ""
            echo "Static website: $WEBSITE_URL"
          } >> "$GITHUB_STEP_SUMMARY"