apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulumi-stack-sa
  namespace: pulumi-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pulumi-stack-role
  namespace: pulumi-system
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pulumi-stack-rb
  namespace: pulumi-system
subjects:
  - kind: ServiceAccount
    name: pulumi-stack-sa
    namespace: pulumi-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pulumi-stack-role