<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulumi Azure Static Website</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0ea5e9;
      --border: #e2e8f0;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #739bcf; /* light blue */;
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(2, 6, 23, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    .pill {
      display: inline-block;
      margin-top: 12px;
      background: #e0f2fe;
      color: #075985;
      border: 1px solid #bae6fd;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    code {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Pulumi Automation API is Live!</h1>
    <p>
      This page is hosted from the Azure Storage static website endpoint created by
      Pulumi in this project.
    </p>
    <p>
      Keep an eye for the next updates!
    </p>
    <span class="pill">Deployed with Pulumi Automation API</span>
  </main>
</body>
</html>
